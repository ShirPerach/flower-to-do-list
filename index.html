        input[type="checkbox"] {
    appearance: none;
    width: 20px;
    height: 20px;
    margin-right: 13px;

 input[type="checkbox"]:checked::after {
    content: "✓";

    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
    <div class="banner"></div>
    <h1>to do list</h1>
    <p class = "subtitle"> complete tasks to plant cute flowers! </p>

   <div id="taskList">
    <input id="taskInput" onkeypress="handleKey(event)">
</div>

<div id="garden">

        <script>
            
   function toggleTask(checkbox) {
    checkbox.parentElement.style.textDecoration = checkbox.checked ? "line-through" : "none";
    let garden = document.getElementById("garden");
    if (checkbox.checked) {
        let flower = document.createElement("img");
        flower.src = "assests/flower1.png";
        flower.style.width = "60px";
        garden.appendChild(flower);
    } else {
        if (garden.lastChild) {
            garden.removeChild(garden.lastChild);
            saveTasks()
        }
    }
}

function deleteTask(btn) {
    btn.parentElement.remove();
    let garden = document.getElementById("garden");
    if (garden.lastChild) {
        garden.removeChild(garden.lastChild);
        saveTasks()
    }
}
     function addTask() {
     let text = document.getElementById("taskInput").value;
     let p = document.createElement("p");
p.innerHTML = "<input type='checkbox' onclick='toggleTask(this)'>" + text + "<img src='assests/bin.png' class='delete-btn' onclick='deleteTask(this)'>";     let taskList = document.getElementById("taskList");
     taskList.insertBefore(p, document.getElementById("taskInput"));
     document.getElementById("taskInput").value = "";
     saveTasks()
}
            
            function handleKey(event) {
            if (event.key === "Enter") {
            addTask();
            document.getElementById("taskInput").value = "";
            

    }
}


function loadTasks() {
    let saved = localStorage.getItem("tasks");
    if (saved) {
        let tasks = JSON.parse(saved);
        for (let i = 0; i < tasks.length; i++) {
            let p = document.createElement("p");
            p.innerHTML = "<input type='checkbox' onclick='toggleTask(this)'>" + tasks[i].text + "<img src='assests/bin.png' class='delete-btn' onclick='deleteTask(this)'>";
            if (tasks[i].done) {
                p.style.textDecoration = "line-through";
                p.querySelector("input").checked = true;
                let flower = document.createElement("img");
                flower.src = "flowers/flower1.png";
                flower.style.width = "60px";
                document.getElementById("garden").appendChild(flower);
            }
            let taskList = document.getElementById("taskList");
            taskList.insertBefore(p, document.getElementById("taskInput"));
        }
    }
}
function saveTasks() {
    let tasks = [];
    let taskElements = document.getElementById("taskList").getElementsByTagName("p");
    for (let i = 0; i < taskElements.length; i++) {
        tasks.push({
            text: taskElements[i].innerText,
            done: taskElements[i].style.textDecoration.includes("line-through")
        });
    }
    localStorage.setItem("tasks", JSON.stringify(tasks));
}
loadTasks();

            
    </script>

   
    
</body>
